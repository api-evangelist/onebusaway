apis:
  - aid: onebusaway:onebusaway-rest-api
    name: OneBusAway REST API
    description: >-
      RESTful web service providing real-time and scheduled transit data for
      agencies running the OneBusAway platform. Endpoints cover agencies with
      coverage, individual agency details, routes, stops, trips, real-time
      arrivals and departures, active vehicle positions, schedule information
      for stops and routes, shape/polyline data, block configuration, search
      for stops and routes by location or name, and user-submitted problem
      reports. Authentication is an API key supplied as the "key" query
      parameter. Responses are available in both JSON and XML; JSON responses
      support an optional JSONP callback parameter. The reference server is
      the Puget Sound deployment at api.pugetsound.onebusaway.org; transit
      agencies can self-host using the open-source application modules.
    humanURL: https://developer.onebusaway.org/api/where
    baseURL: https://api.pugetsound.onebusaway.org
