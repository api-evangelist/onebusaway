aid: onebusaway
name: OneBusAway
description: >-
  OneBusAway is an open-source real-time transit information platform managed
  by the Open Transit Software Foundation. It provides transit riders with
  real-time arrival predictions, service alerts, and schedule data for buses,
  trains, and other transit modes. The platform exposes a RESTful API that
  lets developers access agency information, stop data, route details, trip
  information, real-time arrivals and departures, vehicle positions, and
  service alerts. Authentication uses an API key passed as a query parameter.
  The reference deployment runs at api.pugetsound.onebusaway.org; many transit
  agencies host their own OneBusAway instances using the same API contract.
  Official SDKs are published for Go, Java, Kotlin, JavaScript/Node.js,
  Python, and Ruby, all generated from a shared OpenAPI 3.0 specification in
  the sdk-config repository.
